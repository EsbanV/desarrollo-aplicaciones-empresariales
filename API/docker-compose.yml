version: '3.8'

services:
  kong:
    image: kong:latest
    container_name: kong-gateway
    user: "root"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      # IMPORTANTE: Esto permite que los logs sean visibles para debuggear
      KONG_LOG_LEVEL: notice
    volumes:
      # Asegúrate de que el archivo local se llame exactamente kong.yml
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
    ports:
      - "8000:8000" # Proxy (React -> Kong)
      - "8001:8001" # Admin API
    extra_hosts:
      # Esto es vital en Linux para que 'host.docker.internal' funcione
      - "host.docker.internal:host-gateway"
    restart: always
