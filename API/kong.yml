_format_version: "3.0"
_transform: true

services:
  - name: inventario-api
    url: http://host.docker.internal:5000
    routes:
      - name: inventario-route
        paths:
          - /
        strip_path: false 
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:5173
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Content-Type
            - Authorization
          exposed_headers:
            - Content-Length
          max_age: 3600
          preflight_continue: false

      - name: rate-limiting
        config:
          minute: 20
          policy: local
